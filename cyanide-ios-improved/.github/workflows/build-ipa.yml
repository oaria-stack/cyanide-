name: Build IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Build IPA
        run: |
          bash ./buildipa.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Cyanide-IPA
          path: |
            build/*.ipa
          if-no-files-found: error

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Cyanide-build-logs
          path: |
            build/DerivedData/Logs/**/*.xcactivitylog
          if-no-files-found: ignore
